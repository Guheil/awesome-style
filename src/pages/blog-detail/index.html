<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Details - Awesome Hotel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/main.css" />
    <script defer src="../../components/site-components.js"></script>
    <script defer src="../../assets/js/main.js"></script>
  </head>
  <body class="blog-detail-page" data-blog-detail>
    <site-navbar data-page="blogs"></site-navbar>

    <section
      class="hero blog-detail-hero"
      aria-labelledby="blogDetailHeroTitle"
    >
      <div class="blog-hero-media" aria-hidden="true">
        <img data-blog-hero-image src="" alt="" />
      </div>
      <div class="blog-hero-copy">
        <h1 id="blogDetailHeroTitle" data-blog-title></h1>
      </div>
    </section>

    <main class="blog-detail-main">
      <article class="blog-article">
        <div class="blog-article-shell">
          <header class="blog-article-header">
            <h2 data-blog-title></h2>
            <time data-blog-date datetime=""></time>
          </header>

          <figure class="blog-article-image">
            <img data-blog-image src="" alt="" />
          </figure>

          <div class="blog-article-body" data-blog-body></div>
        </div>
      </article>

      <section class="blog-related" aria-labelledby="blogRelatedTitle">
        <div class="blog-shell">
          <h2 id="blogRelatedTitle">Other Topics</h2>
          <div class="blog-related-grid" data-blog-related></div>
          <a class="blog-show-more" href="../blogs-news/">SHOW MORE</a>
        </div>
      </section>
    </main>

    <site-stay-cta></site-stay-cta>
    <site-footer></site-footer>
  </body>
</html>
